#spring.datasource.url=jdbc:mysql://localhost:3306/ledgerflowdb?useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ledgerflowdb?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
